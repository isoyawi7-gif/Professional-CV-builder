<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Builder FIXED PDF</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* HEADER */
header {
    background: rgba(0,0,0,0.4);
    padding: 15px;
    text-align: center;
}

/* FORM */
.form-container {
    width: 90%;
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}

/* BUTTON */
button {
    padding: 10px;
    background: #00ffcc;
    border: none;
    cursor: pointer;
}

/* ===================== IMPORTANT FIX ===================== */
#cvWrapper {
    width: 900px;
    margin: auto;
    background: white;
    color: black;
    padding: 10px;
}

/* REMOVE FLEX DURING PDF RENDER (critical fix) */
#cv {
    display: block;
}

/* PDF SAFE LAYOUT */
.left, .right {
    width: 100%;
    padding: 10px;
}

.left {
    background: #1f2937;
    color: white;
}

/* BOX */
.box {
    background: #f3f4f6;
    padding: 10px;
    margin: 5px 0;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    background: #111827;
    color: #00ffcc;
}

</style>
</head>

<body>

<header>
<h2>CV BUILDER SYSTEM</h2>
</header>

<div class="form-container">

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="address" placeholder="Address">

<h3>Jobs</h3>
<div id="jobBox"></div>
<button onclick="addJob()">Add Job</button>

<h3>Education</h3>
<div id="eduBox"></div>
<button onclick="addEdu()">Add Education</button>

<h3>Referees</h3>
<div id="refBox"></div>
<button onclick="addRef()">Add Referee</button>

<textarea id="achievements"></textarea>

<button onclick="generateCV()">Generate CV</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<!-- ===================== CV ===================== -->
<div id="cvWrapper">

<div id="cv">

<div class="left">
<h3>SUMMARY</h3>
<p id="summary"></p>

<h3>ACHIEVEMENTS</h3>
<p id="achOut"></p>
</div>

<div class="right">

<h1 id="outName"></h1>
<p id="contact"></p>

<h3>WORK EXPERIENCE</h3>
<div id="jobOut"></div>

<h3>EDUCATION</h3>
<div id="eduOut"></div>

<h3>REFEREES</h3>
<div id="refOut"></div>

</div>
</div>

<footer>ISO YAWI CV BUILDER SYSTEM</footer>

</div>

<script>

let ready=false;

/* JOB */
function addJob(){
let d=document.createElement("div");
d.className="box";
d.innerHTML=`
<input placeholder="Company">
<input placeholder="Position">
<input placeholder="Start (Month/Year)">
<input placeholder="End (or Present)">
<textarea placeholder="Responsibilities"></textarea>
`;
document.getElementById("jobBox").appendChild(d);
}

/* EDU */
function addEdu(){
let d=document.createElement("div");
d.className="box";
d.innerHTML=`
<input placeholder="Institution">
<input placeholder="Start Year">
<input placeholder="End Year or Present">
<input placeholder="Expected Graduation">
`;
document.getElementById("eduBox").appendChild(d);
}

/* REF */
function addRef(){
let d=document.createElement("div");
d.className="box";
d.innerHTML=`
<input placeholder="Name">
<input placeholder="Position">
<input placeholder="Company">
<input placeholder="Contact">
`;
document.getElementById("refBox").appendChild(d);
}

/* GENERATE */
function generateCV(){

document.getElementById("outName").innerText=
document.getElementById("name").value;

document.getElementById("contact").innerText=
document.getElementById("phone").value+" | "+
document.getElementById("email").value+" | "+
document.getElementById("address").value;

/* JOB */
let j="";
document.querySelectorAll("#jobBox .box").forEach(x=>{
let i=x.querySelectorAll("input,textarea");
j+=`<p><b>${i[1].value}</b> - ${i[0].value}<br>${i[2].value} to ${i[3].value}<br>${i[4].value}</p>`;
});
document.getElementById("jobOut").innerHTML=j;

/* EDU */
let e="";
document.querySelectorAll("#eduBox .box").forEach(x=>{
let i=x.querySelectorAll("input");
e+=`<p><b>${i[0].value}</b><br>${i[1].value} - ${i[2].value}<br>Expected: ${i[3].value}</p>`;
});
document.getElementById("eduOut").innerHTML=e;

/* REF */
let r="";
document.querySelectorAll("#refBox .box").forEach(x=>{
let i=x.querySelectorAll("input");
r+=`<p><b>${i[0].value}</b><br>${i[1].value} - ${i[2].value}<br>${i[3].value}</p>`;
});
document.getElementById("refOut").innerHTML=r;

document.getElementById("achOut").innerText=
document.getElementById("achievements").value;

document.getElementById("summary").innerText=
"Engineering professional with telecom and IT experience.";

ready=true;
}

/* ===================== FIXED PDF EXPORT ===================== */
function downloadPDF(){

if(!ready){
alert("Generate CV first");
return;
}

/* FORCE DOM RENDER BEFORE CAPTURE (CRITICAL FIX) */
setTimeout(()=>{

const element=document.getElementById("cvWrapper");

html2pdf().set({
margin:0,
filename:"CV.pdf",
image:{type:"jpeg",quality:1},
html2canvas:{
scale:2,
backgroundColor:"#ffffff",
useCORS:true,
scrollY:0
},
jsPDF:{
unit:"px",
format:[900,1200]
}
}).from(element).save();

},300);

}

</script>

</body>
</html>
