<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Builder - ISO Yawi</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f4f4;
}

/* FORM */
.form-container {
    padding: 20px;
    background: white;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}

.section-box {
    border: 1px solid #ddd;
    padding: 10px;
    margin-bottom: 10px;
}

/* CV */
#cv {
    width: 900px;
    margin: 20px auto;
    display: flex;
    background: white;
}

/* LEFT */
.left {
    width: 30%;
    padding: 20px;
    color: white;
}

/* RIGHT */
.right {
    width: 70%;
    padding: 20px;
}

/* MOBILE VERSION */
@media(max-width: 768px){
    #cv {
        flex-direction: column;
        width: 100%;
    }

    .left, .right {
        width: 100%;
    }
}

/* BUTTON */
button {
    padding: 10px;
    margin: 5px 0;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}

.watermark {
    text-align: center;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="form-container">

<h2>CV Builder</h2>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email">
<input id="address" placeholder="Residential Address">

<!-- EXPERIENCE -->
<h3>Experience</h3>
<div id="jobsContainer"></div>
<button onclick="addJob()">+ Add Job</button>

<!-- EDUCATION -->
<h3>Education</h3>
<div id="educationContainer"></div>
<button onclick="addEducation()">+ Add Education</button>

<h3>Achievements</h3>
<textarea id="achievements"></textarea>

<h3>Theme Color</h3>
<input type="color" id="colorPicker" value="#2c3e50">

<button onclick="generateCV()">Generate CV</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<!-- CV OUTPUT -->
<div id="cv">

<div class="left" id="leftSide">
    <h3>SUMMARY</h3>
    <p id="summary"></p>

    <h3>KEY ACHIEVEMENTS</h3>
    <p id="outputAchievements"></p>
</div>

<div class="right">
    <h1 id="outName"></h1>
    <p id="outContact"></p>

    <h3>EXPERIENCE</h3>
    <div id="outJobs"></div>

    <h3>EDUCATION</h3>
    <div id="outEducation"></div>
</div>

</div>

<div class="watermark">
Powered by: ISO YAWI | PRODUCT CREATOR
</div>

<script>

let jobCount = 0;
let eduCount = 0;

/* ADD JOB */
function addJob(){
    if(jobCount >= 10) return alert("Max 10 jobs");

    let div = document.createElement("div");
    div.className = "section-box";

    div.innerHTML = `
        <input placeholder="Company">
        <input placeholder="Position">
        <input placeholder="Year Start">
        <input placeholder="Year End">
        <textarea placeholder="Responsibilities"></textarea>
        <button onclick="this.parentElement.remove()">Remove</button>
    `;

    document.getElementById("jobsContainer").appendChild(div);
    jobCount++;
}

/* ADD EDUCATION */
function addEducation(){

    let div = document.createElement("div");
    div.className = "section-box";

    div.innerHTML = `
        <input placeholder="Institution">
        <input placeholder="Year Started">
        <input placeholder="Year Ended">
        <label><input type="checkbox"> Currently Studying</label>
        <button onclick="this.parentElement.remove()">Remove</button>
    `;

    document.getElementById("educationContainer").appendChild(div);
    eduCount++;
}

/* AUTO SUMMARY */
function generateSummary(text, achievements){
    return "Results-driven professional with experience in " + text.slice(0,80) +
    ". Proven track record in " + achievements.slice(0,80) +
    ". Strong leadership, operational excellence, and growth delivery.";
}

/* GENERATE CV */
function generateCV(){

    let color = document.getElementById("colorPicker").value;
    document.getElementById("leftSide").style.background = color;

    document.getElementById("outName").innerText =
        document.getElementById("name").value;

    document.getElementById("outContact").innerText =
        document.getElementById("phone").value + " | " +
        document.getElementById("email").value + " | " +
        document.getElementById("address").value;

    /* JOBS OUTPUT */
    let jobs = document.querySelectorAll("#jobsContainer .section-box");
    let jobsHTML = "";
    let jobText = "";

    jobs.forEach(job=>{
        let inputs = job.querySelectorAll("input, textarea");

        jobsHTML += `
        <p><b>${inputs[1].value}</b> - ${inputs[0].value}<br>
        ${inputs[2].value} - ${inputs[3].value}<br>
        ${inputs[4].value}</p>
        `;

        jobText += inputs[1].value + " " + inputs[0].value + " ";
    });

    document.getElementById("outJobs").innerHTML = jobsHTML;

    /* EDUCATION OUTPUT */
    let edus = document.querySelectorAll("#educationContainer .section-box");
    let eduHTML = "";

    edus.forEach(edu=>{
        let inputs = edu.querySelectorAll("input");

        let current = inputs[3].checked ? "Present" : inputs[2].value;

        eduHTML += `
        <p><b>${inputs[0].value}</b><br>
        ${inputs[1].value} - ${current}</p>
        `;
    });

    document.getElementById("outEducation").innerHTML = eduHTML;

    let achievements = document.getElementById("achievements").value;
    document.getElementById("outputAchievements").innerText = achievements;

    let summary = generateSummary(jobText, achievements);
    document.getElementById("summary").innerText = summary;
}

/* DOWNLOAD PDF */
function downloadPDF(){
    html2pdf().from(document.getElementById("cv")).save("CV.pdf");
}

</script>

<footer style="margin-top:20px; padding:15px; background:#0a0f1c; color:#00ffcc; text-align:center;">
ISO YAWI ⚡ School of Electrical Engineering ⚡ PNG University of Technology
</footer>

</body>
</html>
