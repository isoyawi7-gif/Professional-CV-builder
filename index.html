<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced CV Builder System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    padding: 15px;
    text-align: center;
    background: rgba(0,0,0,0.5);
}

.form-container {
    width: 90%;
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px;
    background: #00ffcc;
    border: none;
    margin-top: 5px;
    cursor: pointer;
    font-weight: bold;
}

/* CV */
#cvWrapper {
    width: 900px;
    margin: auto;
    background: white;
    color: black;
    padding: 20px;
    position: relative;
}

#cv { display: flex; }

.left {
    width: 35%;
    background: #1f2937;
    color: white;
    padding: 15px;
}

.right {
    width: 65%;
    padding: 15px;
}

.box {
    background: #f3f4f6;
    padding: 10px;
    margin: 5px 0;
}

#watermark {
    position: absolute;
    bottom: 12px;
    right: 15px;
    font-size: 12px;
    opacity: 0.4;
    font-weight: bold;
}

footer {
    text-align: center;
    padding: 15px;
    background: #111827;
    color: #00ffcc;
}

hr {
    border: 0;
    border-top: 1px solid #ccc;
}

</style>
</head>

<body>

<header>
<h2>ADVANCED CV BUILDER SYSTEM</h2>
</header>

<div class="form-container">

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email">
<input id="address" placeholder="Residential Address">

<h3>Theme Color</h3>
<input type="color" id="colorPicker">

<h3>Jobs</h3>
<div id="jobBox"></div>
<button type="button" onclick="addJob()">Add Job</button>

<h3>Education</h3>
<div id="eduBox"></div>
<button type="button" onclick="addEdu()">Add Education</button>

<h3>Referees</h3>
<div id="refBox"></div>
<button type="button" onclick="addRef()">Add Referee</button>

<h3>Key Achievements</h3>
<textarea id="achievements"></textarea>

<button type="button" onclick="generateCV()">Generate CV</button>
<button type="button" onclick="downloadPDF()">Download PDF</button>

</div>

<!-- CV -->
<div id="cvWrapper">

<div id="cv">

<div class="left">
<h3>SUMMARY</h3>
<p id="summary"></p>

<h3>KEY ACHIEVEMENTS</h3>
<p id="achOut"></p>
</div>

<div class="right">

<h1 id="outName"></h1>
<p id="contact"></p>
<hr>

<h3>WORK EXPERIENCE</h3>
<div id="jobOut"></div>

<h3>EDUCATION</h3>
<div id="eduOut"></div>

<h3>REFEREES</h3>
<div id="refOut"></div>

</div>

</div>

<div id="watermark">Powered by IsoYawi | Product Creator</div>

<footer>ISO YAWI CV BUILDER SYSTEM</footer>

</div>

<script>

let ready = false;

/* SAFE GETTERS */
const get = id => document.getElementById(id);

/* VALIDATION */
function validateInputs(){

if(!get("name").value || !get("phone").value || !get("email").value || !get("address").value){
alert("Fill all personal details!");
return false;
}

if(document.querySelectorAll("#jobBox .box").length === 0){
alert("Add at least 1 job!");
return false;
}

if(document.querySelectorAll("#eduBox .box").length === 0){
alert("Add at least 1 education!");
return false;
}

if(document.querySelectorAll("#refBox .box").length === 0){
alert("Add at least 1 referee!");
return false;
}

let allFilled = true;
document.querySelectorAll(".box input, .box textarea").forEach(x=>{
if(!x.value.trim()) allFilled = false;
});

if(!allFilled){
alert("No empty fields allowed!");
return false;
}

if(!get("achievements").value.trim()){
alert("Enter achievements!");
return false;
}

return true;
}

/* ADD */
function addJob(){
let d=document.createElement("div");
d.className="box";
d.innerHTML=`
<input placeholder="Company">
<input placeholder="Position">
<input placeholder="Start Date">
<input placeholder="End Date">
<textarea placeholder="Responsibilities"></textarea>
`;
get("jobBox").appendChild(d);
}

function addEdu(){
let d=document.createElement("div");
d.className="box";
d.innerHTML=`
<input placeholder="Institution">
<input placeholder="Start Year">
<input placeholder="End Year">
<input placeholder="Qualification">
`;
get("eduBox").appendChild(d);
}

function addRef(){
let d=document.createElement("div");
d.className="box";
d.innerHTML=`
<input placeholder="Name">
<input placeholder="Position">
<input placeholder="Company">
<input placeholder="Contact">
`;
get("refBox").appendChild(d);
}

/* GENERATE */
function generateCV(){

if(!validateInputs()) return;

get("outName").innerText = get("name").value;

get("contact").innerText =
get("phone").value + " | " +
get("email").value + " | " +
get("address").value;

/* JOBS */
let j="";
document.querySelectorAll("#jobBox .box").forEach(x=>{
let i=x.querySelectorAll("input,textarea");
j+=`<p><b>${i[1].value}</b> - ${i[0].value}<br>${i[2].value} → ${i[3].value}<br>${i[4].value}</p>`;
});
get("jobOut").innerHTML=j;

/* EDU */
let e="";
document.querySelectorAll("#eduBox .box").forEach(x=>{
let i=x.querySelectorAll("input");
e+=`<p><b>${i[0].value}</b><br>${i[1].value} - ${i[2].value}<br>${i[3].value}</p>`;
});
get("eduOut").innerHTML=e;

/* REF */
let r="";
document.querySelectorAll("#refBox .box").forEach(x=>{
let i=x.querySelectorAll("input");
r+=`<p><b>${i[0].value}</b><br>${i[1].value} - ${i[2].value}<br>${i[3].value}</p>`;
});
get("refOut").innerHTML=r;

/* ACH */
get("achOut").innerHTML =
get("achievements").value.split("\n").map(x=>"• "+x).join("<br>");

get("summary").innerText =
get("name").value + " is a results-driven professional with strong experience in engineering, leadership, and operations.";

ready = true;

/* SCROLL TO CV */
window.scrollTo(0, get("cvWrapper").offsetTop);

alert("CV Generated Successfully!");
}

/* DOWNLOAD */
function downloadPDF(){

if(!ready){
alert("Generate CV first!");
return;
}

const element = get("cvWrapper");

/* 🔥 TEMP FIX: force layout before capture */
const originalDisplay = element.style.display;
element.style.display = "block";

/* 🔥 Force reflow (important trick) */
element.offsetHeight;

setTimeout(()=>{

html2pdf()
.set({
margin: 10,
filename: "CV.pdf",
image: { type: "jpeg", quality: 1 },
html2canvas: { 
    scale: 2,
    useCORS: true,
    letterRendering: true
},
jsPDF: { 
    unit: "mm", 
    format: "a4", 
    orientation: "portrait" 
}
})
.from(element)
.save()
.then(()=>{
    element.style.display = originalDisplay;
});

}, 500);

}

/* COLOR */
get("colorPicker").addEventListener("input",function(){
document.querySelector(".left").style.background=this.value;
});

</script>

</body>
</html>
