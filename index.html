<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Builder - ISO Yawi</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

/* ===================== BACKGROUND ===================== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b, #0a0f1c);
    color: white;
}

/* ===================== FORM ===================== */
.form-container {
    width: 90%;
    max-width: 900px;
    margin: 20px auto;
    padding: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius: 15px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: none;
}

/* ===================== BUTTON ===================== */
button {
    padding: 10px;
    margin: 5px 0;
    background: #00ffcc;
    color: black;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* ===================== PDF DOCUMENT WRAPPER ===================== */
#cvDocument {
    width: 900px;
    margin: auto;
    background: white;
    color: black;
}

/* ===================== HEADER ===================== */
header {
    text-align: center;
    padding: 15px;
    background: #111827;
    color: white;
}

header h1 {
    margin: 0;
    letter-spacing: 2px;
}

header h3 {
    margin: 5px 0;
    color: #00ffcc;
}

/* ===================== CV ===================== */
#cv {
    display: flex;
}

.left {
    width: 30%;
    padding: 20px;
    background: #1f2937;
    color: white;
}

.right {
    width: 70%;
    padding: 20px;
}

.section-box {
    background: #f3f4f6;
    padding: 10px;
    margin-bottom: 10px;
}

/* ===================== FOOTER ===================== */
footer {
    text-align: center;
    padding: 15px;
    background: #111827;
    color: #00ffcc;
    font-size: 13px;
}

</style>
</head>

<body>

<!-- ===================== FORM ===================== -->
<div class="form-container">

<h2>CV Builder</h2>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="address" placeholder="Address">

<textarea id="achievements" placeholder="Achievements"></textarea>

<button onclick="generateCV()">Generate CV</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<!-- ===================== FULL PDF AREA ===================== -->
<div id="cvDocument">

<!-- HEADER (NOW INCLUDED IN PDF) -->
<header>
    <h1>ISO YAWI</h1>
    <h3>Engineering • Software • Innovation</h3>
    <div style="font-size:13px;">
        📧 iso.yawi111@gmail.com | 📱 PNG University of Technology
    </div>
</header>

<!-- CV CONTENT -->
<div id="cv">

<div class="left">
    <h3>SUMMARY</h3>
    <p id="summary"></p>

    <h3>ACHIEVEMENTS</h3>
    <p id="outAch"></p>
</div>

<div class="right">
    <h1 id="outName"></h1>
    <p id="contact"></p>
</div>

</div>

<!-- FOOTER (NOW INCLUDED IN PDF ✔) -->
<footer>
    ⚡ ISO YAWI • Engineering Innovation System ⚡<br>
    Electrical Engineering • Software Development • Telecommunications • PNGUoT
</footer>

</div>

<script>

let isGenerated = false;

/* ===================== GENERATE ===================== */
function generateCV(){

    document.getElementById("outName").innerText =
        document.getElementById("name").value;

    document.getElementById("contact").innerText =
        document.getElementById("phone").value + " | " +
        document.getElementById("email").value + " | " +
        document.getElementById("address").value;

    document.getElementById("outAch").innerText =
        document.getElementById("achievements").value;

    document.getElementById("summary").innerText =
        "Electrical Engineer with expertise in telecom systems, IT infrastructure, and network deployment.";

    isGenerated = true;
}

/* ===================== PDF DOWNLOAD FIXED ===================== */
function downloadPDF(){

    if(!isGenerated){
        alert("Generate CV first!");
        return;
    }

    const element = document.getElementById("cvDocument");

    const opt = {
        margin: 0,
        filename: 'ISO_YAWI_CV.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: {
            scale: 2,
            useCORS: true,
            backgroundColor: "#ffffff"
        },
        jsPDF: {
            unit: 'px',
            format: [900, 1200],
            orientation: 'portrait'
        }
    };

    html2pdf().set(opt).from(element).save();
}

</script>

</body>
</html>
