<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Builder - FIXED</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

/* ===================== BACKGROUND ===================== */
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b, #0a0f1c);
    color: white;
}

/* ===================== HEADER ===================== */
header {
    position: sticky;
    top: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
    padding: 15px;
    text-align: center;
}

/* ===================== FORM ===================== */
.form-container {
    width: 90%;
    max-width: 900px;
    margin: auto;
    padding: 20px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}

/* ===================== BUTTON ===================== */
button {
    padding: 10px;
    background: #00ffcc;
    border: none;
    cursor: pointer;
    margin: 5px 0;
}

/* ===================== PDF WRAPPER (IMPORTANT FIX) ===================== */
#cvWrapper {
    width: 900px;
    margin: auto;
    background: white;
    color: black;
}

/* ===================== CV ===================== */
#cv {
    display: flex;
}

.left {
    width: 30%;
    background: #1f2937;
    color: white;
    padding: 15px;
}

.right {
    width: 70%;
    padding: 15px;
}

/* ===================== BOX ===================== */
.box {
    background: #f3f4f6;
    padding: 10px;
    margin: 5px 0;
}

/* ===================== FOOTER ===================== */
footer {
    text-align: center;
    padding: 15px;
    background: #111827;
    color: #00ffcc;
}

</style>
</head>

<body>

<header>
<!-- ===================== HEADER (GLASS UI ONLY) ===================== -->

    <h1>ISO YAWI</h1>
    <h3>Engineering • Software • Innovation</h3>
    <div style="font-size:13px;">
        📧 iso.yawi111@gmail.com | 📱 PNG University of Technology
    </div>

<h2>PRoFESSIONAL CV BUILDER SYSTEM</h2>
</header>

<div class="form-container">

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="address" placeholder="Address">

<h3>Jobs</h3>
<div id="jobBox"></div>
<button onclick="addJob()">Add Job</button>

<h3>Education</h3>
<div id="eduBox"></div>
<button onclick="addEdu()">Add Education</button>

<h3>Referees</h3>
<div id="refBox"></div>
<button onclick="addRef()">Add Referee</button>

<textarea id="achievements" placeholder="Achievements"></textarea>

<button onclick="generateCV()">Generate CV</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<!-- ===================== PDF AREA ===================== -->
<div id="cvWrapper">

<div id="cv">

<div class="left">
<h3>SUMMARY</h3>
<p id="summary"></p>

<h3>ACHIEVEMENTS</h3>
<p id="achOut"></p>
</div>

<div class="right">

<h1 id="outName"></h1>
<p id="contact"></p>

<h3>WORK EXPERIENCE</h3>
<div id="jobOut"></div>

<h3>EDUCATION</h3>
<div id="eduOut"></div>

<h3>REFEREES</h3>
<div id="refOut"></div>

</div>
</div>

<footer>
ISO YAWI CV BUILDER SYSTEM
</footer>

</div>

<script>

let generated = false;

/* ===================== JOB ===================== */
function addJob(){
let div = document.createElement("div");
div.className="box";
div.innerHTML=`
<input placeholder="Company">
<input placeholder="Position">
<input placeholder="Start Month/Year">
<input placeholder="End Month/Year or 'Present'">
<textarea placeholder="Responsibilities"></textarea>
<button onclick="this.parentElement.remove()">Remove</button>
`;
document.getElementById("jobBox").appendChild(div);
}

/* ===================== EDUCATION ===================== */
function addEdu(){
let div = document.createElement("div");
div.className="box";
div.innerHTML=`
<input placeholder="Institution">
<input placeholder="Start Year">
<input placeholder="End Year or 'Present'">
<input placeholder="Expected Graduation (if studying)">
<button onclick="this.parentElement.remove()">Remove</button>
`;
document.getElementById("eduBox").appendChild(div);
}

/* ===================== REFEREE ===================== */
function addRef(){
let div = document.createElement("div");
div.className="box";
div.innerHTML=`
<input placeholder="Name">
<input placeholder="Position">
<input placeholder="Company">
<input placeholder="Contact">
<button onclick="this.parentElement.remove()">Remove</button>
`;
document.getElementById("refBox").appendChild(div);
}

/* ===================== GENERATE ===================== */
function generateCV(){

document.getElementById("outName").innerText =
document.getElementById("name").value;

document.getElementById("contact").innerText =
document.getElementById("phone").value+" | "+
document.getElementById("email").value+" | "+
document.getElementById("address").value;

/* JOBS */
let jobHTML="";
document.querySelectorAll("#jobBox .box").forEach(j=>{
let i=j.querySelectorAll("input,textarea");
jobHTML+=`<p><b>${i[1].value}</b> - ${i[0].value}<br>${i[2].value} to ${i[3].value}<br>${i[4].value}</p>`;
});
document.getElementById("jobOut").innerHTML=jobHTML;

/* EDUCATION */
let eduHTML="";
document.querySelectorAll("#eduBox .box").forEach(e=>{
let i=e.querySelectorAll("input");
eduHTML+=`<p><b>${i[0].value}</b><br>${i[1].value} - ${i[2].value}<br>Expected: ${i[3].value}</p>`;
});
document.getElementById("eduOut").innerHTML=eduHTML;

/* REF */
let refHTML="";
document.querySelectorAll("#refBox .box").forEach(r=>{
let i=r.querySelectorAll("input");
refHTML+=`<p><b>${i[0].value}</b><br>${i[1].value}, ${i[2].value}<br>${i[3].value}</p>`;
});
document.getElementById("refOut").innerHTML=refHTML;

document.getElementById("achOut").innerText =
document.getElementById("achievements").value;

document.getElementById("summary").innerText =
"Engineering professional with strong telecom and IT experience.";

generated=true;
}

/* ===================== PDF FIX ===================== */
function downloadPDF(){

if(!generated){
alert("Generate CV first");
return;
}

const element=document.getElementById("cvWrapper");

html2pdf().set({
margin:0,
filename:"CV.pdf",
image:{type:"jpeg",quality:1},
html2canvas:{
scale:2,
backgroundColor:"#ffffff",
useCORS:true
},
jsPDF:{
unit:"px",
format:[900,1200]
}
}).from(element).save();

}

</script>

</body>
</html>
