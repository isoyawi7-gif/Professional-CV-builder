<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced CV Builder System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* HEADER */
header {
    padding: 15px;
    text-align: center;
    background: rgba(0,0,0,0.5);
}

/* FORM */
.form-container {
    width: 90%;
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 5px;
    border: none;
}

/* BUTTON */
button {
    padding: 10px;
    background: #00ffcc;
    border: none;
    margin-top: 5px;
    cursor: pointer;
    font-weight: bold;
}

/* ================= CV STYLE ================= */
#cvWrapper {
    width: 900px;
    margin: auto;
    background: white;
    color: black;
    padding: 20px;
    position: relative;
}

/* LAYOUT */
#cv {
    display: flex;
}

.left {
    width: 35%;
    background: #1f2937;
    color: white;
    padding: 15px;
}

.right {
    width: 65%;
    padding: 15px;
}

/* BOX */
.box {
    background: #f3f4f6;
    padding: 10px;
    margin: 5px 0;
}

/* WATERMARK */
#watermark {
    position: absolute;
    bottom: 12px;
    right: 15px;
    font-size: 12px;
    opacity: 0.4;
    font-weight: bold;
    color: #111;
    pointer-events: none;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    background: #111827;
    color: #00ffcc;
}

</style>
</head>

<body>

<header>
<h2>ADVANCED CV BUILDER SYSTEM</h2>
</header>

<div class="form-container">

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email">
<input id="address" placeholder="Residential Address">

<h3>Select CV Theme Colour</h3>
<input type="color" id="colorPicker">

<h3>Jobs</h3>
<div id="jobBox"></div>
<button onclick="addJob()">Add Job</button>

<h3>Education</h3>
<div id="eduBox"></div>
<button onclick="addEdu()">Add Education</button>

<h3>Referees</h3>
<div id="refBox"></div>
<button onclick="addRef()">Add Referee</button>

<h3>Key Achievements</h3>
<textarea id="achievements"></textarea>

<button onclick="generateCV()">Generate CV</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<!-- ================= CV ================= -->
<div id="cvWrapper">

<div id="cv">

<div class="left">
<h3>SUMMARY</h3>
<p id="summary"></p>

<h3>KEY ACHIEVEMENTS</h3>
<p id="achOut"></p>
</div>

<div class="right">

<h1 id="outName"></h1>
<p id="contact"></p>

<h3>WORK EXPERIENCE</h3>
<div id="jobOut"></div>

<h3>EDUCATION</h3>
<div id="eduOut"></div>

<h3>REFEREES</h3>
<div id="refOut"></div>

</div>

</div>

<div id="watermark">Powered by IsoYawi | Product Creator</div>

<footer>ISO YAWI CV BUILDER SYSTEM</footer>

</div>

<script>

let ready = false;

/* ADD JOB */
function addJob(){
let d=document.createElement("div");
d.className="box";
d.innerHTML=`
<input placeholder="Company">
<input placeholder="Position">
<input placeholder="Start Date">
<input placeholder="End Date">
<textarea placeholder="Responsibilities"></textarea>
`;
document.getElementById("jobBox").appendChild(d);
}

/* ADD EDU */
function addEdu(){
let d=document.createElement("div");
d.className="box";
d.innerHTML=`
<input placeholder="Institution">
<input placeholder="Start Year">
<input placeholder="End Year">
<input placeholder="Qualification">
`;
document.getElementById("eduBox").appendChild(d);
}

/* ADD REF */
function addRef(){
let d=document.createElement("div");
d.className="box";
d.innerHTML=`
<input placeholder="Name">
<input placeholder="Position">
<input placeholder="Company">
<input placeholder="Contact">
`;
document.getElementById("refBox").appendChild(d);
}

/* SUMMARY */
function autoSummary(){
let name=document.getElementById("name").value;
return name + " is a highly skilled professional with experience in engineering, operations, and leadership roles with strong technical capability.";
}

/* ACHIEVEMENTS */
function autoAchievements(text){
return text.split("\n").map(x=>"• "+x).join("<br>");
}

/* GENERATE CV */
function generateCV(){

document.getElementById("outName").innerText=document.getElementById("name").value;

document.getElementById("contact").innerText =
document.getElementById("phone").value+" | "+
document.getElementById("email").value+" | "+
document.getElementById("address").value;

/* JOBS */
let j="";
document.querySelectorAll("#jobBox .box").forEach(x=>{
let i=x.querySelectorAll("input,textarea");
j+=`<p><b>${i[1].value}</b> - ${i[0].value}<br>${i[2].value} → ${i[3].value}<br>${i[4].value}</p>`;
});
document.getElementById("jobOut").innerHTML=j;

/* EDUCATION */
let e="";
document.querySelectorAll("#eduBox .box").forEach(x=>{
let i=x.querySelectorAll("input");
e+=`<p><b>${i[0].value}</b><br>${i[1].value} - ${i[2].value}<br>${i[3].value}</p>`;
});
document.getElementById("eduOut").innerHTML=e;

/* REFEREES */
let r="";
document.querySelectorAll("#refBox .box").forEach(x=>{
let i=x.querySelectorAll("input");
r+=`<p><b>${i[0].value}</b><br>${i[1].value} - ${i[2].value}<br>${i[3].value}</p>`;
});
document.getElementById("refOut").innerHTML=r;

/* ACHIEVEMENTS */
document.getElementById("achOut").innerHTML =
autoAchievements(document.getElementById("achievements").value);

/* SUMMARY */
document.getElementById("summary").innerText=autoSummary();

ready = true;
}

/* PDF DOWNLOAD */
function downloadPDF(){

if(!ready){
alert("Generate CV first");
return;
}

setTimeout(()=>{

html2pdf().set({
margin:0,
filename:"CV.pdf",
image:{type:"jpeg",quality:1},
html2canvas:{scale:2},
jsPDF:{unit:"px",format:[900,1200]}
}).from(document.getElementById("cvWrapper")).save();

},300);

}

/* COLOR CHANGE */
document.getElementById("colorPicker").addEventListener("input",function(){
document.querySelector(".left").style.background=this.value;
});

</script>

</body>
</html>
